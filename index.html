<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Type Warrior Online</title>
    <style>
        body { margin: 0; background: #111; color: white; font-family: 'Courier New', Courier, monospace; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #gameContainer { position: relative; }
        canvas { background: #222; display: block; border: 2px solid #444; }
        #ui { position: absolute; top: 15px; left: 20px; right: 20px; font-size: 18px; font-weight: bold; text-shadow: 2px 2px black; display: flex; justify-content: space-between; pointer-events: none; }
        #startScreen { position: absolute; top: 0; left: 0; width: 800px; height: 500px; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        h1 { color: #ff3333; font-size: 38px; margin: 0; }
        #menuSub { font-size: 16px; color: #33aaff; margin: 20px 0; font-weight: bold; }
        .instructions { background: #222; padding: 15px; border: 1px solid #444; text-align: center; color: #aaa; font-size: 13px; max-width: 500px; }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas" width="800" height="500"></canvas>
    <div id="ui">
        <div style="color: #33aaff;">YOU - SCORE: <span id="myScore">0</span> | LIVES: <span id="myLives">10</span></div>
        <div style="color: #ffaa33;">OPPONENT - SCORE: <span id="oppScore">0</span> | LIVES: <span id="oppLives">10</span></div>
    </div>
    <div id="startScreen">
        <h1 id="menuTitle">ONLINE TYPE WARRIOR</h1>
        <div id="menuSub">CONNECTING TO LOBBY SERVER...</div>
        <div class="instructions">
            <p><strong>HOW TO PLAY:</strong> Match randomly online. Type the words floating above incoming enemies to strike them down before they cross your defensive line.</p>
        </div>
    </div>
</div>

<!-- Socket.io connection library -->
<script src="https://socket.io"></script>
<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const startScreen = document.getElementById("startScreen");
const menuTitle = document.getElementById("menuTitle");
const menuSub = document.getElementById("menuSub");

// PASTE YOUR LIVE DEPLOYED BACKEND SERVER URL HERE (Replace localhost when hosted)
const BACKEND_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
    ? "http://localhost:3000" 
    : window.location.origin;

const socket = io(BACKEND_URL);

let gameRunning = false, currentRoomId = null, myRole = 'p1';
let syncWords = [], enemySpawnIndex = 0, spawnTimer = 0;

// Dual Arena Engine States
const me = { score: 0, lives: 10, x: 120, y: 180, state: "idle", timer: 0, enemies: [], target: null, color: "#33aaff" };
const opp = { score: 0, lives: 10, x: 120, y: 400, state: "idle", timer: 0, enemies: [], target: null, color: "#ffaa33" };

// Local Audio Engine Context Synth Lines
let audioCtx = null;
function playSound(type) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    const now = audioCtx.currentTime;
    if (type === "type") { osc.frequency.setValueAtTime(550, now); gain.gain.setValueAtTime(0.05, now); osc.start(); osc.stop(now+0.04); }
    if (type === "slash") { osc.type = "sawtooth"; osc.frequency.setValueAtTime(600, now); osc.frequency.exponentialRampToValueAtTime(100, now+0.1); gain.gain.setValueAtTime(0.1, now); osc.start(); osc.stop(now+0.1); }
    if (type === "error") { osc.type = "triangle"; osc.frequency.setValueAtTime(110, now); gain.gain.setValueAtTime(0.15, now); osc.start(); osc.stop(now+0.15); }
}

socket.on('status', (msg) => { menuSub.innerText = msg; });

socket.on('match_found', (data) => {
    currentRoomId = data.roomId;
    myRole = data.role;
    syncWords = data.words;
    
    // Assign structural fields contextually
    me.score = 0; me.lives = 10; me.enemies = []; me.target = null;
    opp.score = 0; opp.lives = 10; opp.enemies = []; opp.target = null;
    enemySpawnIndex = 0; spawnTimer = 0;
    
    startScreen.style.display = "none";
    gameRunning = true;
    
    // Force spawn first target
    triggerGlobalSpawn();
    requestAnimationFrame(gameLoop);
});

function triggerGlobalSpawn() {
    const targetWord = syncWords[enemySpawnIndex % syncWords.length];
    enemySpawnIndex++;
    
    me.enemies.push({ x: canvas.width + 20, y: me.y, word: targetWord, index: 0, speed: 1.2 });
    opp.enemies.push({ x: canvas.width + 20, y: opp.y, word: targetWord, index: 0, speed: 1.2 });
}

window.addEventListener("keydown", (e) => {
    if (!gameRunning || e.key.length !== 1) return;
    const key = e.key.toUpperCase();

    if (!me.target) me.target = me.enemies.find(enemy => enemy.word.startsWith(key));

    if (me.target) {
        if (me.target.word[me.target.index] === key) {
            me.target.index++;
            me.state = "attack"; me.timer = 5;
            playSound("type");

            // Network Packet update broadcast
            socket.emit('player_action', { roomId: currentRoomId, role: myRole, action: 'type', index: me.target.index });

            if (me.target.index >= me.target.word.length) {
                playSound("slash");
                me.enemies = me.enemies.filter(item => item !== me.target);
                me.target = null;
                me.score += 10;
                socket.emit('player_action', { roomId: currentRoomId, role: myRole, action: 'kill', score: me.score });
            }
        } else { handleLocalMistake(); }
    } else { handleLocalMistake(); }
    document.getElementById("myScore").innerText = me.score;
});

function handleLocalMistake() {
    playSound("error");
    me.lives--;
    document.getElementById("myLives").innerText = me.lives;
    socket.emit('player_action', { roomId: currentRoomId, role: myRole, action: 'mistake', lives: me.lives });
    if (me.lives <= 0) { socket.emit('game_over_claim', { roomId: currentRoomId, loserRole: myRole, reason: "RAN OUT OF LIVES!" }); }
}

// Receive opponent network updates
socket.on('opponent_action', (data) => {
    if (data.action === 'type') {
        opp.state = "attack"; opp.timer = 5;
        if (opp.enemies[0]) opp.enemies[0].index = data.index;
    }
    if (data.action === 'kill') {
        opp.enemies.shift();
        opp.target = null;
        opp.score = data.score;
        document.getElementById("oppScore").innerText = opp.score;
    }
    if (data.action === 'mistake') {
        opp.lives = data.lives;
        document.getElementById("oppLives").innerText = opp.lives;
    }
});

socket.on('match_ended', (data) => {
    gameRunning = false;
    startScreen.style.display = "flex";
    if (data.loserRole === myRole) {
        menuTitle.innerText = "YOU LOSE!";
        menuSub.innerText = `Reason: ${data.reason}`;
    } else {
        menuTitle.innerText = "YOU WIN!";
        menuSub.innerText = "You dominated the typing arena!";
    }
    menuSub.innerHTML += `<br><br><span style='color:white;'>Final Scores - You: ${me.score} | Opponent: ${opp.score}</span><br><br>Searching for a new match...`;
});

function drawStickman(x, y, isAttacking, color, isEnemy = false) {
    ctx.lineWidth = 4; ctx.strokeStyle = isEnemy ? "#ff3333" : color; ctx.beginPath();
    ctx.arc(x, y - 60, 10, 0, Math.PI * 2); ctx.moveTo(x, y - 50); ctx.lineTo(x, y - 20);
    if (isAttacking) {
        ctx.moveTo(x, y - 20); ctx.lineTo(x - 15, y); ctx.moveTo(x, y - 20); ctx.lineTo(x + 20, y);
        ctx.moveTo(x, y - 40); ctx.lineTo(x + 25, y - 35); ctx.strokeStyle = "#00ffff";
        ctx.moveTo(x + 20, y - 50); ctx.lineTo(x + 40, y - 20);
    } else {
        ctx.moveTo(x, y - 20); ctx.lineTo(x - 10, y); ctx.moveTo(x, y - 20); ctx.lineTo(x + 10, y);
        ctx.moveTo(x, y - 40); ctx.lineTo(x + (isEnemy?-15:15), y - 25);
    }
    ctx.stroke();
}

function gameLoop() {
    if (!gameRunning) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    spawnTimer++;
    if (spawnTimer > 150) { triggerGlobalSpawn(); spawnTimer = 0; }

    [me, opp].forEach((p, idx) => {
        ctx.strokeStyle = "#333"; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(0, p.y); ctx.lineTo(canvas.width, p.y); ctx.stroke();

        for (let i = p.enemies.length - 1; i >= 0; i--) {
            let enemy = p.enemies[i];
            if (p === me) enemy.x -= enemy.speed; // Control tracking movements safely
            else enemy.x -= enemy.speed;

            drawStickman(enemy.x, enemy.y, false, null, true);

            ctx.font = "bold 16px 'Courier New'";
            const typed = enemy.word.substring(0, enemy.index);
            const remaining = enemy.word.substring(enemy.index);
            ctx.fillStyle = "#00ff00"; ctx.fillText(typed, enemy.x - 20, enemy.y - 80);
            ctx.fillStyle = "#ffffff"; ctx.fillText(remaining, enemy.x - 20 + ctx.measureText(typed).width, enemy.y - 80);

            if (p === me && enemy.x <= p.x + 25) {
                socket.emit('game_over_claim', { roomId: currentRoomId, loserRole: myRole, reason: "AN ENEMY BREACHED YOUR DEFENSE!" });
            }
        }

        if (p.state === "attack") { p.timer--; if (p.timer <= 0) p.state = "idle"; }
        let drawX = p.x;
        if (p.state === "attack" && p.enemies[0]) drawX = p.enemies[0].x - 40;
        drawStickman(drawX, p.y, p.state === "attack", p.color, false);
    });

    requestAnimationFrame(gameLoop);
}
</script>
</body>
</html>
